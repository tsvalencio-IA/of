<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acesso ao Sistema</title>
<link rel="stylesheet" href="css/design.css">
<style>
/* LOGIN PAGE — grid animado sutil */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
  animation: gridDrift 30s linear infinite;
}
@keyframes gridDrift { to { background-position: 48px 48px; } }

/* Input password toggle */
.pwd-wrap { position: relative; }
.pwd-wrap .input { padding-right: 42px; }
.pwd-toggle {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 15px; padding: 4px;
}
.pwd-toggle:hover { color: var(--text-primary); }

/* Animação stagger nos campos */
.login-card .form-group:nth-child(1) { animation: slideUp 0.4s 0.1s both; }
.login-card .form-group:nth-child(2) { animation: slideUp 0.4s 0.2s both; }
.login-card .btn                    { animation: slideUp 0.4s 0.3s both; }
@keyframes slideUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
</style>
</head>
<body>
<div id="toast-container"></div>

<div class="login-page" style="position:relative;z-index:1">
  <div class="login-card" style="animation: modal-in 0.3s ease">
    <div class="login-logo-wrap">
      <div class="login-logo-mark brand-logo-mark">J</div>
      <div class="login-title brand-name">JARVIS ERP</div>
      <div class="login-sub brand-tagline">Gestão Automotiva Inteligente</div>
    </div>

    <div id="loginErr" class="login-err">Usuário ou senha incorretos.</div>

    <div class="form-group">
      <label class="form-label">Usuário de acesso</label>
      <input class="input input-mono" id="usr" type="text" placeholder="seu.usuario" autocomplete="off" spellcheck="false">
    </div>

    <div class="form-group">
      <label class="form-label">Senha</label>
      <div class="pwd-wrap">
        <input class="input" id="pwd" type="password" placeholder="••••••••">
        <button class="pwd-toggle" type="button" onclick="_togglePwd()" id="pwdToggle" title="Ver senha">👁</button>
      </div>
    </div>

    <button class="btn btn-brand btn-xl btn-full" id="btnLogin" onclick="autenticar()" style="margin-top:8px">
      Entrar no Sistema
    </button>

    <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)">
      <div class="status-dot online"></div>
      <span style="font-family:var(--ff-mono);font-size:0.62rem;color:var(--text-muted)">SISTEMA OPERACIONAL</span>
    </div>
  </div>

  <div style="position:absolute;bottom:20px;left:0;right:0;text-align:center;font-family:var(--ff-mono);font-size:0.6rem;color:var(--text-disabled)">
    <span class="brand-footer">Powered by thIAguinho Soluções · 2026</span>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/config.js"></script>
<script>
// Limpa sessão ao carregar o login
sessionStorage.clear();

const db = window.initFirebase();

function _togglePwd() {
  const p = document.getElementById('pwd');
  const btn = document.getElementById('pwdToggle');
  if (p.type === 'password') { p.type = 'text'; btn.textContent = '🙈'; }
  else { p.type = 'password'; btn.textContent = '👁'; }
}

document.getElementById('pwd').addEventListener('keydown', e => { if (e.key === 'Enter') autenticar(); });
document.getElementById('usr').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('pwd').focus(); });

async function autenticar() {
  const usr = document.getElementById('usr').value.trim();
  const pwd = document.getElementById('pwd').value.trim();
  const err = document.getElementById('loginErr');
  err.style.display = 'none';

  if (!usr || !pwd) {
    err.textContent = 'Preencha usuário e senha.';
    err.style.display = 'block';
    return;
  }

  const btn = document.getElementById('btnLogin');
  btn.innerHTML = '<div class="spinner"></div> Autenticando...';
  btn.disabled = true;

  try {
    // CAMADA 1: Admin da oficina
    const snapOf = await db.collection('oficinas').where('usuario', '==', usr).get();
    if (!snapOf.empty) {
      const doc = snapOf.docs[0];
      const d   = doc.data();
      if (d.senha !== pwd)        throw new Error('Senha incorreta.');
      if (d.status === 'Bloqueado') throw new Error('Licença bloqueada. Contate o suporte.');

      sessionStorage.setItem('j_tid',          doc.id);
      sessionStorage.setItem('j_tnome',        d.nomeFantasia || 'Oficina');
      sessionStorage.setItem('j_role',         'admin');
      sessionStorage.setItem('j_nome',         d.nomeFantasia || 'Gestor');
      sessionStorage.setItem('j_gemini',       d.apiKeys?.gemini      || '');
      sessionStorage.setItem('j_nicho',        d.nicho                || 'carros');
      sessionStorage.setItem('j_cloud_name',   d.apiKeys?.cloudName   || 'dmuvm1o6m');
      sessionStorage.setItem('j_cloud_preset', d.apiKeys?.cloudPreset || 'evolution');

      // Salvar brand do tenant
      const brand = {
        name:       d.brandName    || d.nomeFantasia,
        tagline:    d.brandTagline || 'Gestão Automotiva',
        logoLetter: d.brandLetter  || (d.nomeFantasia || 'J').charAt(0).toUpperCase(),
        color:      d.brandColor   || '#3B82F6',
        footer:     d.brandFooter  || `${d.nomeFantasia} · Powered by JARVIS ERP`
      };
      brand.colorDim  = _hexDim(brand.color, 0.12);
      brand.colorGlow = _hexDim(brand.color, 0.25);
      sessionStorage.setItem('j_brand', JSON.stringify(brand));

      window.location.href = 'jarvis.html';
      return;
    }

    // CAMADA 2: Funcionário / equipe
    const snapFn = await db.collection('funcionarios').where('usuario', '==', usr).get();
    if (!snapFn.empty) {
      const docF = snapFn.docs[0];
      const dF   = docF.data();
      if (dF.senha !== pwd) throw new Error('Senha incorreta.');

      const mae = await db.collection('oficinas').doc(dF.tenantId).get();
      if (!mae.exists || mae.data().status === 'Bloqueado') throw new Error('Oficina bloqueada.');

      const maeData = mae.data();
      sessionStorage.setItem('j_tid',          dF.tenantId);
      sessionStorage.setItem('j_tnome',        maeData.nomeFantasia || 'Oficina');
      sessionStorage.setItem('j_role',         dF.cargo === 'gerente' ? 'gerente' : 'equipe');
      sessionStorage.setItem('j_nome',         dF.nome);
      sessionStorage.setItem('j_fid',          docF.id);
      sessionStorage.setItem('j_comissao',     dF.comissao || 0);
      sessionStorage.setItem('j_gemini',       maeData.apiKeys?.gemini      || '');
      sessionStorage.setItem('j_nicho',        maeData.nicho                || 'carros');
      sessionStorage.setItem('j_cloud_name',   maeData.apiKeys?.cloudName   || 'dmuvm1o6m');
      sessionStorage.setItem('j_cloud_preset', maeData.apiKeys?.cloudPreset || 'evolution');

      const brand = {
        name:       maeData.brandName    || maeData.nomeFantasia,
        logoLetter: maeData.brandLetter  || (maeData.nomeFantasia || 'J').charAt(0).toUpperCase(),
        color:      maeData.brandColor   || '#3B82F6',
        footer:     maeData.brandFooter  || `${maeData.nomeFantasia} · Powered by JARVIS ERP`
      };
      brand.colorDim = _hexDim(brand.color, 0.12);
      sessionStorage.setItem('j_brand', JSON.stringify(brand));

      window.location.href = 'equipe.html';
      return;
    }

    throw new Error('Usuário não encontrado no sistema.');

  } catch (e) {
    err.textContent = e.message;
    err.style.display = 'block';
    btn.innerHTML = 'Entrar no Sistema';
    btn.disabled = false;
  }
}

function _hexDim(hex, alpha) {
  const c = hex.replace('#', '');
  const r = parseInt(c.substring(0,2),16);
  const g = parseInt(c.substring(2,4),16);
  const b = parseInt(c.substring(4,6),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// Aplicar brand se já salvou (reload)
window.addEventListener('load', () => {
  try {
    const brand = JSON.parse(sessionStorage.getItem('j_brand') || 'null');
    if (brand) window.aplicarBrand(brand);
  } catch(e) {}
});
</script>
</body>
</html>
